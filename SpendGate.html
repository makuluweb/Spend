<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="SpendGate" />
  <meta name="theme-color" content="#5C4530" />
  <title>SpendGate</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #FAF6EF; --warm: #F0E8D8; --paper: #EDE4D0;
      --bark: #8B6F47; --earth: #5C4530; --moss: #4A7060;
      --gold: #C9924A; --rust: #B85C38; --ink: #2C1F14; --light-ink: #6B5040;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    html, body { height: 100%; }
    body { background: var(--cream); font-family: 'Lato', sans-serif; color: var(--ink); -webkit-text-size-adjust: 100%; }
    #app { max-width: 480px; margin: 0 auto; padding: calc(var(--safe-top) + 12px) 14px calc(var(--safe-bottom) + 60px); }

    /* Header */
    .header { text-align: center; padding: 18px 0 14px; }
    .header-icon { font-size: 1.9rem; margin-bottom: 4px; }
    .header h1 { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--earth); }
    .header p { font-size: 0.68rem; color: var(--light-ink); font-weight: 300; margin-top: 3px; letter-spacing: 0.5px; text-transform: uppercase; }

    /* Vault */
    .vault-card { background: var(--earth); border-radius: 18px; padding: 18px 20px; margin-bottom: 14px; position: relative; overflow: hidden; }
    .vault-card::before { content: ''; position: absolute; top: -30px; right: -30px; width: 120px; height: 120px; border-radius: 50%; background: rgba(255,255,255,0.04); }
    .vault-label { font-size: 0.65rem; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 2px; }
    .vault-amount { font-family: 'Playfair Display', serif; font-size: 2.1rem; color: #fff; font-weight: 700; line-height: 1; }
    .vault-sub { font-size: 0.68rem; color: rgba(255,255,255,0.4); margin-top: 3px; }
    .vault-row { display: flex; gap: 20px; margin-top: 11px; padding-top: 11px; border-top: 1px solid rgba(255,255,255,0.1); }
    .vault-mini-label { font-size: 0.62rem; color: rgba(255,255,255,0.45); text-transform: uppercase; letter-spacing: 1px; }
    .vault-mini-val { font-family: 'Playfair Display', serif; font-size: 0.95rem; color: rgba(255,255,255,0.85); margin-top: 1px; }

    /* Tabs */
    .tab-bar { display: flex; background: var(--warm); border-radius: 12px; padding: 4px; margin-bottom: 14px; }
    .tab-btn { flex: 1; padding: 8px 4px; border: none; border-radius: 9px; background: transparent; font-family: 'Lato', sans-serif; font-size: 0.72rem; font-weight: 700; color: var(--light-ink); cursor: pointer; transition: all 0.18s; -webkit-tap-highlight-color: transparent; }
    .tab-btn.active { background: #fff; color: var(--earth); box-shadow: 0 1px 6px rgba(92,69,48,0.12); }

    /* Cards */
    .card { background: #fff; border-radius: 16px; padding: 18px; margin-bottom: 12px; border: 1px solid var(--warm); box-shadow: 0 2px 10px rgba(92,69,48,0.05); }
    .card-title { font-family: 'Playfair Display', serif; font-size: 0.98rem; color: var(--earth); margin-bottom: 12px; }

    /* Inputs */
    .input-group { margin-bottom: 10px; }
    .input-label { display: block; font-size: 0.65rem; color: var(--light-ink); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 5px; font-weight: 700; }
    .input-field { width: 100%; padding: 12px 13px; border: 1.5px solid var(--paper); border-radius: 10px; font-family: 'Lato', sans-serif; font-size: 16px; color: var(--ink); background: var(--cream); outline: none; transition: border-color 0.2s; -webkit-appearance: none; }
    .input-field:focus { border-color: var(--bark); }
    .amount-input { font-size: 1.3rem; font-family: 'Playfair Display', serif; font-weight: 700; color: var(--earth); }

    /* Buttons */
    .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-family: 'Lato', sans-serif; font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: all 0.18s; -webkit-tap-highlight-color: transparent; display: block; text-align: center; }
    .btn-primary { background: var(--earth); color: #fff; margin-top: 4px; }
    .btn-moss  { background: var(--moss); color: #fff; }
    .btn-rust  { background: var(--rust); color: #fff; margin-top: 8px; }
    .btn-ghost { background: transparent; color: var(--light-ink); border: 1.5px solid var(--paper); margin-top: 8px; }
    .btn-wait  { background: #f5f0e8; color: var(--bark); border: 1.5px solid var(--paper); margin-top: 8px; }
    .btn-export { background: var(--warm); color: var(--earth); border: 1.5px solid var(--paper); font-size: 0.85rem; }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-transfer { width: 100%; padding: 12px 14px; border-radius: 10px; border: 2px dashed var(--bark); background: transparent; font-family: 'Lato', sans-serif; font-size: 0.82rem; font-weight: 700; color: var(--bark); cursor: pointer; transition: all 0.2s; text-align: center; display: block; -webkit-tap-highlight-color: transparent; }
    .transfer-done { text-align: center; font-size: 0.82rem; color: var(--moss); font-weight: 700; padding: 10px; background: #edf7f0; border-radius: 8px; }
    .transfer-cta { width: 100%; padding: 14px; border: 2px dashed var(--bark); border-radius: 12px; background: transparent; font-family: 'Lato', sans-serif; cursor: pointer; text-align: center; margin-bottom: 10px; display: block; -webkit-tap-highlight-color: transparent; }
    .transfer-cta-label { font-size: 0.68rem; color: var(--light-ink); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 3px; }
    .transfer-cta-text { font-size: 0.86rem; font-weight: 700; color: var(--bark); }

    /* Stats */
    .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    .stat-box { background: var(--earth); border-radius: 14px; padding: 14px; }
    .stat-box.green { background: var(--moss); }
    .stat-box.rust  { background: var(--rust); }
    .stat-box.bark  { background: var(--bark); }
    .stat-label { font-size: 0.62rem; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; }
    .stat-val { font-family: 'Playfair Display', serif; font-size: 1.25rem; color: #fff; font-weight: 700; }

    /* Questions */
    .q-progress { display: flex; gap: 6px; margin-bottom: 16px; }
    .q-dot { height: 4px; flex: 1; border-radius: 4px; background: var(--paper); transition: background 0.3s; }
    .q-dot.active { background: var(--bark); }
    .q-dot.done   { background: var(--moss); }
    .q-icon   { font-size: 1.8rem; margin-bottom: 8px; display: block; }
    .q-text   { font-family: 'Playfair Display', serif; font-size: 1.08rem; color: var(--earth); margin-bottom: 4px; }
    .q-detail { font-size: 0.78rem; color: var(--light-ink); line-height: 1.5; margin-bottom: 15px; }
    .q-btn { width: 100%; padding: 13px; border-radius: 11px; border: 1.5px solid var(--paper); background: var(--cream); font-family: 'Lato', sans-serif; font-size: 0.88rem; color: var(--ink); cursor: pointer; text-align: left; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; -webkit-tap-highlight-color: transparent; }
    .q-num { width: 24px; height: 24px; border-radius: 50%; background: var(--paper); display: flex; align-items: center; justify-content: center; font-size: 0.68rem; font-weight: 700; color: var(--light-ink); flex-shrink: 0; }

    /* Decision */
    .caution-bar { display: flex; gap: 6px; margin-bottom: 13px; }
    .caution-pip { flex: 1; height: 6px; border-radius: 4px; background: var(--paper); }
    .caution-pip.lit { background: var(--rust); }
    .decision-msg { font-family: 'Playfair Display', serif; font-size: 1.08rem; line-height: 1.5; color: var(--earth); margin-bottom: 4px; }
    .decision-sub { font-size: 0.76rem; color: var(--light-ink); margin-bottom: 14px; line-height: 1.5; }
    .item-summary { background: var(--warm); border-radius: 10px; padding: 11px; margin-bottom: 14px; font-size: 0.84rem; color: var(--earth); }

    /* Buy reason */
    .reason-chips { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 12px; }
    .reason-chip { padding: 8px 12px; border-radius: 20px; border: 1.5px solid var(--paper); background: var(--cream); font-family: 'Lato', sans-serif; font-size: 0.78rem; color: var(--light-ink); cursor: pointer; font-weight: 600; -webkit-tap-highlight-color: transparent; }
    .reason-chip.active { border-color: var(--rust); background: #fde8e3; color: var(--rust); }
    .comment-textarea { width: 100%; padding: 11px 13px; border: 1.5px solid var(--paper); border-radius: 10px; font-family: 'Lato', sans-serif; font-size: 16px; color: var(--ink); background: var(--cream); outline: none; resize: none; line-height: 1.5; }
    .comment-textarea:focus { border-color: var(--bark); }
    .btn-row { display: flex; gap: 8px; margin-top: 8px; }
    .btn-save-comment   { flex: 1; padding: 10px; border-radius: 10px; border: none; background: var(--rust); color: #fff; font-family: 'Lato', sans-serif; font-size: 0.84rem; font-weight: 700; cursor: pointer; }
    .btn-cancel-comment { flex: 1; padding: 10px; border-radius: 10px; border: 1.5px solid var(--paper); background: transparent; color: var(--light-ink); font-family: 'Lato', sans-serif; font-size: 0.84rem; font-weight: 700; cursor: pointer; }

    /* Celebrate */
    .celebrate-amount { font-family: 'Playfair Display', serif; font-size: 2.5rem; font-weight: 700; color: var(--moss); text-align: center; margin: 5px 0; }
    .quote-block { background: var(--warm); border-left: 3px solid var(--gold); border-radius: 0 10px 10px 0; padding: 12px 14px; margin: 13px 0; }
    .quote-text { font-family: 'Playfair Display', serif; font-style: italic; font-size: 0.88rem; color: var(--earth); line-height: 1.6; }
    .quote-author { font-size: 0.66rem; color: var(--light-ink); margin-top: 5px; text-transform: uppercase; letter-spacing: 0.8px; }

    /* History */
    .history-item { display: flex; align-items: center; justify-content: space-between; padding: 9px 0; border-bottom: 1px solid var(--warm); }
    .history-item:last-child { border-bottom: none; }
    .history-name { font-size: 0.82rem; color: var(--ink); font-weight: 700; }
    .history-date { font-size: 0.66rem; color: var(--light-ink); margin-top: 1px; }
    .history-right { display: flex; align-items: center; flex-shrink: 0; gap: 4px; }
    .history-amt { font-family: 'Playfair Display', serif; font-size: 0.86rem; font-weight: 700; color: var(--earth); }
    .history-badge { font-size: 0.66rem; font-weight: 700; padding: 2px 7px; border-radius: 20px; }
    .badge-saved  { background: #e8f5e9; color: var(--moss); }
    .badge-bought { background: #fde8e3; color: var(--rust); }
    .toggle-hist { background: none; border: none; color: var(--bark); font-size: 0.76rem; cursor: pointer; font-family: 'Lato', sans-serif; text-decoration: underline; padding: 3px 0; }

    /* Delete controls */
    .del-btn { background: none; border: none; font-size: 1rem; cursor: pointer; padding: 4px 6px; border-radius: 6px; opacity: 0.4; line-height: 1; -webkit-tap-highlight-color: transparent; }
    .del-confirm-row { background: #fff8f6; border: 1px solid #f5cfc8; border-radius: 10px; padding: 10px 12px; margin-top: 4px; display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 4px; }
    .del-confirm-text { font-size: 0.78rem; color: var(--ink); font-weight: 600; }
    .del-yes { padding: 7px 14px; border-radius: 8px; border: none; background: var(--rust); color: #fff; font-family: 'Lato', sans-serif; font-size: 0.76rem; font-weight: 700; cursor: pointer; }
    .del-no  { padding: 7px 14px; border-radius: 8px; border: 1.5px solid var(--paper); background: transparent; color: var(--light-ink); font-family: 'Lato', sans-serif; font-size: 0.76rem; font-weight: 700; cursor: pointer; }

    /* Monthly saved items */
    .month-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
    .month-name { font-family: 'Playfair Display', serif; font-size: 0.98rem; color: var(--earth); font-weight: 700; }
    .month-sub  { font-size: 0.7rem; color: var(--light-ink); margin-top: 2px; }
    .month-amt  { font-family: 'Playfair Display', serif; font-size: 1.25rem; color: var(--moss); font-weight: 700; }
    .month-toggle { background: none; border: none; font-size: 0.68rem; color: var(--bark); cursor: pointer; text-decoration: underline; font-family: 'Lato', sans-serif; font-weight: 700; padding: 0; margin-top: 3px; display: block; text-align: right; }
    .progress-bar { background: var(--warm); border-radius: 6px; height: 6px; margin-bottom: 12px; }
    .progress-fill { height: 100%; border-radius: 6px; transition: width 0.5s ease; }
    .saved-item-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--warm); }
    .saved-item-row:last-child { border-bottom: none; }
    .saved-item-name { font-size: 0.82rem; font-weight: 700; color: var(--ink); }
    .saved-item-date { font-size: 0.66rem; color: var(--light-ink); margin-top: 1px; }
    .saved-item-amt  { font-family: 'Playfair Display', serif; font-size: 0.9rem; font-weight: 700; color: var(--moss); }

    /* Purchases */
    .month-divider { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 1.2px; color: var(--light-ink); font-weight: 700; margin: 14px 0 8px; }
    .purchase-card { background: #fff; border-radius: 14px; border: 1px solid var(--warm); margin-bottom: 8px; box-shadow: 0 1px 6px rgba(92,69,48,0.04); overflow: hidden; }
    .purchase-header { display: flex; justify-content: space-between; align-items: flex-start; padding: 13px 13px 11px; cursor: pointer; }
    .purchase-name { font-size: 0.88rem; font-weight: 700; color: var(--ink); }
    .purchase-meta { font-size: 0.68rem; color: var(--light-ink); margin-top: 3px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .purchase-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; margin-left: 8px; }
    .purchase-amt { font-family: 'Playfair Display', serif; font-size: 0.95rem; font-weight: 700; color: var(--rust); }
    .comment-pill { display: inline-block; padding: 1px 7px; border-radius: 10px; font-size: 0.65rem; font-weight: 700; background: #fff3cd; color: #856404; }
    .comment-pill.empty { background: #f8f0e8; color: var(--bark); }
    .purchase-expanded { padding: 0 13px 13px; border-top: 1px solid var(--warm); padding-top: 11px; }
    .existing-comment { background: var(--warm); border-radius: 8px; padding: 10px 12px; margin-bottom: 10px; }
    .existing-comment-label { font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.8px; color: var(--light-ink); margin-bottom: 4px; font-weight: 700; }
    .existing-comment-text { font-family: 'Playfair Display', serif; font-style: italic; font-size: 0.88rem; color: var(--earth); line-height: 1.5; }
    .no-comment-msg { font-size: 0.8rem; color: var(--light-ink); margin-bottom: 10px; }
    .btn-edit-comment { width: 100%; padding: 9px; border-radius: 9px; border: 1.5px solid var(--paper); background: var(--cream); font-family: 'Lato', sans-serif; font-size: 0.8rem; font-weight: 700; color: var(--bark); cursor: pointer; }
    .del-confirm-inner { padding: 10px 13px 13px; border-top: 1px solid var(--warm); background: #fff8f6; }
    .nudge-banner { background: #fff8ec; border: 1px solid #f0d99a; border-radius: 10px; padding: 10px 14px; font-size: 0.78rem; color: var(--bark); margin-bottom: 12px; font-weight: 600; }

    /* Wait & Revisit */
    .wait-pill { display: inline-block; background: var(--warm); border: 1px solid var(--paper); border-radius: 20px; padding: 6px 14px; font-size: 0.76rem; color: var(--bark); font-weight: 700; margin-bottom: 16px; }
    .revisit-card { border-color: #e8d5a3; background: #fffdf5; }
    .revisit-item { padding: 10px 0; border-bottom: 1px solid #f0e8d0; }
    .revisit-item:last-child { border-bottom: none; padding-bottom: 0; }
    .revisit-name { font-size: 0.86rem; font-weight: 700; color: var(--ink); }
    .revisit-meta { font-size: 0.72rem; color: var(--light-ink); margin-top: 2px; margin-bottom: 8px; }
    .revisit-ready { color: var(--moss); font-weight: 700; }
    .revisit-waiting { color: var(--bark); font-weight: 700; }
    .revisit-btns { display: flex; gap: 7px; }
    .revisit-btn-save { flex: 1; padding: 9px; border-radius: 9px; border: none; background: var(--moss); color: #fff; font-family: 'Lato', sans-serif; font-size: 0.78rem; font-weight: 700; cursor: pointer; }
    .revisit-btn-buy  { flex: 1; padding: 9px; border-radius: 9px; border: none; background: var(--rust); color: #fff; font-family: 'Lato', sans-serif; font-size: 0.78rem; font-weight: 700; cursor: pointer; }
    .revisit-btn-del  { padding: 9px 12px; border-radius: 9px; border: 1.5px solid var(--paper); background: transparent; color: var(--light-ink); font-family: 'Lato', sans-serif; font-size: 0.76rem; font-weight: 700; cursor: pointer; }

    /* Coin rain */
    .coin-rain { position: fixed; top: 0; left: 0; right: 0; height: 100vh; pointer-events: none; z-index: 100; overflow: hidden; }
    .coin { position: absolute; top: -40px; font-size: 1.5rem; animation: coinFall linear forwards; }
    @keyframes coinFall { 0% { top: -40px; opacity: 1; transform: rotate(0deg); } 80% { opacity: 1; } 100% { top: 100vh; opacity: 0; transform: rotate(360deg); } }

    /* Loading dots */
    .loading-dots span { animation: blink 1.2s infinite; opacity: 0; }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%, 80%, 100% { opacity: 0; } 40% { opacity: 1; } }

    /* Animations */
    .fade-in { animation: fadeIn 0.28s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .hidden { display: none !important; }
  </style>
</head>
<body>
<div id="app"></div>

<script>
// ─── Data ───────────────────────────────────────────────────────
const QUOTES = [
  { text: "A penny saved is a penny earned.", author: "Benjamin Franklin" },
  { text: "Beware of little expenses; a small leak will sink a great ship.", author: "Benjamin Franklin" },
  { text: "Do not save what is left after spending, but spend what is left after saving.", author: "Warren Buffett" },
  { text: "The habit of saving is itself an education; it fosters every virtue, teaches self-denial.", author: "T.T. Munger" },
  { text: "It's not your salary that makes you rich, it's your spending habits.", author: "Charles A. Jaffe" },
  { text: "Wealth consists not in having great possessions, but in having few wants.", author: "Epictetus" },
  { text: "Too many people spend money they haven't earned to buy things they don't want.", author: "Will Rogers" },
];
const QUESTIONS = [
  { id:"need",   icon:"⚖️", question:"Need or want?",   detail:"Is this something you genuinely need, or just want in this moment?",         options:["I truly need it","Honestly, it\u2019s a want"],      caution:1 },
  { id:"thirty", icon:"📅", question:"The 30-day test", detail:"Will you still care about this purchase in 30 days?",                        options:["Yes, absolutely","Probably not"],                      caution:1 },
  { id:"better", icon:"🎯", question:"Better use?",     detail:"Could this money do something more meaningful \u2014 savings, bills, a goal?",options:["No, this is the best use","Yes, there\u2019s a better use"], caution:1 },
];
const BUY_REASONS = ["It's a genuine necessity","It's a planned purchase","It's a special occasion","I've thought about it for a while","It fits within my budget","Other reason"];

// ─── Helpers ─────────────────────────────────────────────────────
const fmt = n => new Intl.NumberFormat("en-AU",{style:"currency",currency:"AUD"}).format(n||0);
const getMonthKey = d => { const p=d.split("/"); return p.length===3?`${p[2]}-${p[1]}`:d; };
const getMonthLabel = k => { const [y,m]=k.split("-"); return new Date(+y,+m-1,1).toLocaleDateString("en-AU",{month:"long",year:"numeric"}); };
const rand = arr => arr[Math.floor(Math.random()*arr.length)];
const h = (tag, attrs={}, ...children) => {
  const el = document.createElement(tag);
  Object.entries(attrs).forEach(([k,v]) => {
    if (k==="class") el.className=v;
    else if (k==="style" && typeof v==="object") Object.assign(el.style,v);
    else if (k.startsWith("on")) el.addEventListener(k.slice(2).toLowerCase(),v);
    else el.setAttribute(k,v);
  });
  children.flat().forEach(c => c!=null && el.append(typeof c==="string"||typeof c==="number" ? document.createTextNode(String(c)) : c));
  return el;
};

// ─── State ───────────────────────────────────────────────────────
let state = {
  tab: "gate", screen: "home",
  item: "", amount: "",
  answers: {}, currentQ: 0,
  history: (() => { try { return JSON.parse(localStorage.getItem("sg_history")||"[]"); } catch{ return []; } })(),
  quote: null, aiQuote: null, apiLoading: false,
  showHistory: false, lastSavedIdx: null,
  buyComment: "", buyReason: "",
  confirmDelHist: null,
  // monthly tab
  expandedMonth: null, confirmDelSaved: null,
  // purchases tab
  expandedPurchase: null, editingPurchase: null, editComment: "", confirmDelPurchase: null,
};

function setState(patch) {
  Object.assign(state, typeof patch === "function" ? patch(state) : patch);
  render();
}

function persist() {
  try { localStorage.setItem("sg_history", JSON.stringify(state.history)); } catch{}
}
function updateHistory(h) {
  state.history = h;
  persist();
}

// ─── API ─────────────────────────────────────────────────────────
async function getAIQuote(itemName, amtVal) {
  setState({ apiLoading: true, aiQuote: null });
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:1000,
        messages:[{role:"user",content:`Someone just resisted buying "${itemName}" for ${fmt(amtVal)}. Write one short, warm, encouraging thought (1-2 sentences) celebrating their discipline. Make it feel personal and fresh — not a clichéd quote. No attribution. No quote marks.`}]})
    });
    const data = await res.json();
    const text = data.content?.find(b=>b.type==="text")?.text||null;
    setState({ apiLoading: false, aiQuote: text });
  } catch { setState({ apiLoading: false }); }
}

// ─── Export CSV ──────────────────────────────────────────────────
function exportCSV() {
  const h = state.history;
  const mm = {};
  h.forEach(e => {
    const k = getMonthKey(e.date);
    if (!mm[k]) mm[k]={saved:0,bought:0,transferred:false};
    if (e.type==="saved"){mm[k].saved+=e.amount;if(e.monthTransferred)mm[k].transferred=true;}
    else if(e.type==="bought") mm[k].bought+=e.amount;
  });
  const lines = ["SpendGate Export","","=== ALL DECISIONS ===","Date,Item,Amount (AUD),Decision,Reason / Comment,Transferred to Savings",
    ...h.map(e=>`"${e.date}","${e.item}","${e.amount.toFixed(2)}","${e.type==="saved"?"Skipped":e.type==="bought"?"Purchased":"Waiting"}","${(e.comment||"").replace(/"/g,"''")}","${e.type==="bought"?"N/A":e.monthTransferred?"Yes":"No"}"`),
    "","=== MONTHLY SUMMARY ===","Month,Saved (AUD),Spent (AUD),Transferred to Savings",
    ...Object.keys(mm).sort().reverse().map(k=>`"${getMonthLabel(k)}","${mm[k].saved.toFixed(2)}","${mm[k].bought.toFixed(2)}","${mm[k].transferred?"Yes":"No"}"`)
  ];
  const blob = new Blob([lines.join("\n")],{type:"text/csv;charset=utf-8;"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href=url; a.download=`SpendGate_${new Date().toISOString().slice(0,10)}.csv`; a.click();
  URL.revokeObjectURL(url);
}

// ─── Actions ─────────────────────────────────────────────────────
function resetFlow() {
  setState({ screen:"home", item:"", amount:"", answers:{}, currentQ:0,
    quote:null, aiQuote:null, lastSavedIdx:null, buyComment:"", buyReason:"", apiLoading:false });
}

function handleAnswer(qIdx, ansIdx) {
  const q = QUESTIONS[qIdx];
  const isCaution = ansIdx === q.caution;
  state.answers[q.id] = isCaution ? "caution" : "ok";
  if (qIdx < QUESTIONS.length-1) setTimeout(()=>setState({currentQ:qIdx+1}), 280);
  else setTimeout(()=>setState({screen:"decision"}), 280);
  render();
}

function handleSkip() {
  const amtVal = parseFloat(state.amount); if(!amtVal) return;
  const entry = { item:state.item||"Unnamed purchase", amount:amtVal, date:new Date().toLocaleDateString("en-AU"), type:"saved", monthTransferred:false };
  const newH = [entry,...state.history].slice(0,200);
  updateHistory(newH);
  const q = rand(QUOTES);
  setState({ lastSavedIdx:0, quote:q, aiQuote:null, screen:"celebrate" });
  getAIQuote(state.item||"this item", amtVal);
}

function handleWait() {
  const amtVal = parseFloat(state.amount);
  const revisitAt = Date.now() + 24*60*60*1000;
  const entry = { item:state.item||"Unnamed purchase", amount:amtVal, date:new Date().toLocaleDateString("en-AU"), type:"waiting", revisitAt };
  updateHistory([entry,...state.history].slice(0,200));
  setState({ screen:"waiting" });
}

function handleBuyConfirm() {
  const amtVal = parseFloat(state.amount);
  const comment = state.buyReason || state.buyComment.trim() || "";
  const entry = { item:state.item||"Unnamed purchase", amount:amtVal, date:new Date().toLocaleDateString("en-AU"), type:"bought", comment };
  updateHistory([entry,...state.history].slice(0,200));
  resetFlow();
}

function handleTransferNow() {
  const updated = state.history.map((h,i)=>i===state.lastSavedIdx?{...h,monthTransferred:true}:h);
  updateHistory(updated); render();
}

function deleteHistEntry(idx) {
  updateHistory(state.history.filter((_,i)=>i!==idx));
  setState({ confirmDelHist:null });
}

function handleRevisitSkip(idx) {
  const h = state.history[idx];
  const entry = { item:h.item, amount:h.amount, date:new Date().toLocaleDateString("en-AU"), type:"saved", monthTransferred:false };
  const newH = [entry,...state.history.filter((_,i)=>i!==idx)].slice(0,200);
  updateHistory(newH);
  const q = rand(QUOTES);
  setState({ lastSavedIdx:0, quote:q, aiQuote:null, screen:"celebrate", item:h.item, amount:String(h.amount) });
  getAIQuote(h.item, h.amount);
}

function handleRevisitBuy(idx) {
  const h = state.history[idx];
  const entry = { item:h.item, amount:h.amount, date:new Date().toLocaleDateString("en-AU"), type:"bought", comment:"" };
  updateHistory([entry,...state.history.filter((_,i)=>i!==idx)].slice(0,200));
  resetFlow();
}

// ─── Computed ────────────────────────────────────────────────────
function totals() {
  const saved = state.history.filter(h=>h.type==="saved").reduce((s,h)=>s+h.amount,0);
  const transferred = state.history.filter(h=>h.type==="saved"&&h.monthTransferred).reduce((s,h)=>s+h.amount,0);
  const cautionCount = Object.values(state.answers).filter(v=>v==="caution").length;
  return { saved, transferred, cautionCount };
}

// ─── Coin Rain ───────────────────────────────────────────────────
function coinRain() {
  const div = h("div",{class:"coin-rain"});
  for(let i=0;i<12;i++){
    const c = h("div",{class:"coin",style:{left:`${8+i*7.5}%`,animationDelay:`${i*0.08}s`,animationDuration:`${0.7+(i%3)*0.2}s`}},"💰");
    div.appendChild(c);
  }
  return div;
}

// ─── Tab: Monthly ────────────────────────────────────────────────
function renderMonthlyTab() {
  const { history, expandedMonth, confirmDelSaved } = state;
  const monthMap = {};
  history.forEach((entry,i)=>{
    if(entry.type==="waiting") return;
    const k=getMonthKey(entry.date);
    if(!monthMap[k]) monthMap[k]={saved:0,bought:0,count:0,allTransferred:true,items:[]};
    if(entry.type==="saved"){
      monthMap[k].saved+=entry.amount; monthMap[k].count++;
      monthMap[k].items.push({...entry,_idx:i});
      if(!entry.monthTransferred) monthMap[k].allTransferred=false;
    } else if(entry.type==="bought") monthMap[k].bought+=entry.amount;
  });
  const months = Object.keys(monthMap).sort().reverse();
  const maxSaved = Math.max(...months.map(k=>monthMap[k].saved),1);
  const allTimeSaved = history.filter(h=>h.type==="saved").reduce((s,h)=>s+h.amount,0);

      h("div",{class:"stat-box green"},h("div",{class:"stat-label"},"Transferred ✓"),h("div",{class:"stat-val"},fmt(allTimeTx)))
    ),
    h("button",{class:"btn btn-export",style:{marginBottom:"14px"},onClick:exportCSV},"⬇️ Export to Excel / CSV"),

            h("div",{class:"month-sub"},`${m.count} purchase${m.count!==1?"s":""} skipped`+(m.bought>0?` · ${fmt(m.bought)} spent`:""))
          ),
          h("div",{style:{textAlign:"right"}},
            h("div",{class:"month-amt"},fmt(m.saved)),
            h("button",{class:"month-toggle",onClick:()=>setState({expandedMonth:isExp?null:k,confirmDelSaved:null})},
              isExp?`Hide items ▲`:`Show ${m.count} item${m.count!==1?"s":""} ▼`)
          )
        ),
        h("div",{class:"progress-bar"},
          h("div",{class:"progress-fill",style:{background:m.allTransferred?"var(--moss)":"var(--gold)",width:`${(m.saved/maxSaved)*100}%`}})
        ),
        ...(isExp&&m.items.length>0 ? [
          h("div",{style:{marginBottom:"12px",borderTop:"1px solid var(--warm)",paddingTop:"10px"}},
            ...m.items.map(entry=>h("div",{},
              h("div",{class:"saved-item-row"},
                h("div",{style:{flex:"1"}},
                  h("div",{class:"saved-item-name"},entry.item),
                  h("div",{class:"saved-item-date"},entry.date+(entry.monthTransferred?" · 🏦":""))
                ),
                h("div",{style:{display:"flex",alignItems:"center",gap:"6px",flexShrink:"0"}},

                  h("button",{class:"del-btn",onClick:()=>setState({confirmDelSaved:confirmDelSaved===entry._idx?null:entry._idx})},"🗑️")
                )

                    h("span",{class:"del-confirm-text"},"Remove this saved entry?"),

                updateHistory(state.history.map(e=>getMonthKey(e.date)===k&&e.type==="saved"?{...e,monthTransferred:true}:e));

            h("div",{class:"purchase-right"},
              h("div",{class:"purchase-amt"},fmt(entry.amount)),
              h("button",{class:"del-btn",onClick:e=>{e.stopPropagation();setState({confirmDelPurchase:isDel?null:entry._idx,expandedPurchase:entry._idx});}},"🗑️")
            )
          ),
          isDel
            ? h("div",{class:"del-confirm-inner"},
                h("span",{style:{fontSize:"0.82rem",color:"var(--ink)",fontWeight:"600"}},"Remove this entry?"),
                h("div",{class:"btn-row"},
                  h("button",{class:"del-yes",onClick:()=>{ updateHistory(state.history.filter((_,i)=>i!==entry._idx)); setState({confirmDelPurchase:null,expandedPurchase:null}); }},"Yes, delete"),
                  h("button",{class:"del-no", onClick:()=>setState({confirmDelPurchase:null})},"Cancel")
                )
              )
            : isExp
              ? h("div",{class:"purchase-expanded"},
                  isEdit
                    ? h("div",{},
                        h("div",{class:"reason-chips"},
                          ...BUY_REASONS.map(r=>h("button",{class:`reason-chip${editComment===r?" active":""}`,onClick:()=>setState({editComment:editComment===r?"":r})},r))
                        ),
                        h("textarea",{class:"comment-textarea",placeholder:"Or write your own reason…",rows:"3",
                          onInput:e=>setState({editComment:e.target.value}),value:editComment}),
                        h("div",{class:"btn-row"},
                          h("button",{class:"btn-save-comment",onClick:()=>{
                            updateHistory(state.history.map((he,i)=>i===entry._idx?{...he,comment:state.editComment.trim()}:he));
                            setState({editingPurchase:null,editComment:""});
                          }},"Save note"),
                          h("button",{class:"btn-cancel-comment",onClick:()=>setState({editingPurchase:null,editComment:""})},"Cancel")
                        )
                      )
                    : h("div",{},
                        entry.comment
                          ? h("div",{class:"existing-comment"},h("div",{class:"existing-comment-label"},"Your reason"),h("div",{class:"existing-comment-text"},"\u201c",entry.comment,"\u201d"))
                          : h("div",{class:"no-comment-msg"},"No reason recorded for this purchase."),
                        h("button",{class:"btn-edit-comment",onClick:e=>{e.stopPropagation();setState({editingPurchase:entry._idx,editComment:entry.comment||""});}},
                          "✏️ "+(entry.comment?"Edit reason":"Add reason"))
                      )
                )
              : null
        );
      })
    ))
  );
}

// ─── Main Render ─────────────────────────────────────────────────
function render() {
  const { tab, history } = state;
  const { saved: totalSaved, transferred: totalTransferred } = totals();

  const vault = h("div",{class:"vault-card"},
    h("div",{class:"vault-label"},"Total Saved"),
    h("div",{class:"vault-amount"},fmt(totalSaved)),
    h("div",{class:"vault-sub"},history.filter(h=>h.type==="saved").length," purchases resisted"),
    totalSaved>0
      ? h("div",{class:"vault-row"},
          h("div",{},h("div",{class:"vault-mini-label"},"In vault"),h("div",{class:"vault-mini-val"},fmt(totalSaved-totalTransferred))),
          h("div",{},h("div",{class:"vault-mini-label"},"Transferred ✓"),h("div",{class:"vault-mini-val"},fmt(totalTransferred)))
        )
      : null
  );

  const tabs = h("div",{class:"tab-bar"},
    h("button",{class:`tab-btn${tab==="gate"?" active":""}`,onClick:()=>setState({tab:"gate"})},"🛑 Gate"),
    h("button",{class:`tab-btn${tab==="monthly"?" active":""}`,onClick:()=>setState({tab:"monthly"})},"📊 Savings"),
    h("button",{class:`tab-btn${tab==="purchases"?" active":""}`,onClick:()=>setState({tab:"purchases"})},"🛍️ Purchases")
  );

  const tabContent =
    tab==="gate"      ? renderGateTab()      :
    tab==="monthly"   ? renderMonthlyTab()   :
                        renderPurchasesTab();

  const root = document.getElementById("app");
  root.innerHTML = "";
  root.append(
    h("div",{class:"header"},
      h("div",{class:"header-icon"},"🏦"),
      h("h1",{},"SpendGate"),
      h("p",{},"Think before you spend")
    ),
    vault, tabs, tabContent
  );
}

render();
</script>
</body>
</html>
